<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채팅</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f4f7fa;
  --surface: #ffffff;
  --surface2: #eef2f7;
  --surface3: #e4eaf2;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.11);
  --accent: #b1cee6;
  --accent-dark: #7aaac8;
  --accent-darker: #4d8ab0;
  --accent-dim: rgba(177,206,230,0.25);
  --accent-text: #2a6a94;
  --text: #1a1f2e;
  --text2: #5a6680;
  --text3: #9aa3b8;
  --bubble-me: #b1cee6;
  --bubble-me-text: #1a3a52;
  --bubble-friend: #ffffff;
  --bubble-friend-text: #1a1f2e;
  --green: #34c759;
  --red: #ff3b30;
  --yellow: #ff9500;
  --radius: 18px;
  --radius-sm: 11px;
  --shadow: 0 1px 4px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
}
html, body { height: 100%; font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); }
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; }

/* ── LOBBY ── */
#lobby {
  flex-direction: column; align-items: center; justify-content: center;
  padding: 2rem; background: var(--bg); position: relative; overflow: hidden;
}
#lobby::before {
  content: ''; position: fixed; width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(177,206,230,0.35) 0%, transparent 70%);
  top: -180px; right: -100px; pointer-events: none;
}
#lobby::after {
  content: ''; position: fixed; width: 350px; height: 350px; border-radius: 50%;
  background: radial-gradient(circle, rgba(177,206,230,0.2) 0%, transparent 70%);
  bottom: -80px; left: -80px; pointer-events: none;
}
.lobby-inner { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 1.75rem; position: relative; z-index: 1; }
.logo { text-align: center; }
.logo-mark {
  display: inline-flex; align-items: center; justify-content: center;
  width: 58px; height: 58px; border-radius: 20px;
  background: var(--accent); box-shadow: 0 4px 16px rgba(177,206,230,0.5); margin-bottom: 1rem;
}
.logo-mark svg { width: 30px; height: 30px; }
.logo h1 { font-size: 1.65rem; font-weight: 700; letter-spacing: -0.03em; color: var(--text); }
.logo p { font-size: 0.85rem; color: var(--text2); margin-top: 0.3rem; }
.card {
  background: var(--surface); border: 0.5px solid var(--border2);
  border-radius: var(--radius); padding: 1.5rem;
  display: flex; flex-direction: column; gap: 1rem;
  box-shadow: var(--shadow);
}
.field-label { font-size: 0.75rem; font-weight: 600; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.4rem; }
input[type="text"], input[type="password"] {
  width: 100%; padding: 0.7rem 1rem; background: var(--surface2);
  border: 1px solid var(--border2); border-radius: var(--radius-sm);
  color: var(--text); font-size: 0.95rem; font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s; outline: none;
}
input[type="text"]:focus, input[type="password"]:focus {
  border-color: var(--accent-dark); box-shadow: 0 0 0 3px rgba(177,206,230,0.3);
}
input::placeholder { color: var(--text3); }
.btn {
  padding: 0.75rem 1.25rem; border-radius: var(--radius-sm); border: none;
  font-size: 0.9rem; font-family: inherit; font-weight: 600; cursor: pointer;
  transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: var(--bubble-me-text); box-shadow: 0 2px 8px rgba(177,206,230,0.4); }
.btn-primary:hover { background: var(--accent-dark); color: #fff; }
.btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { background: var(--surface3); color: var(--text); }
.divider { display: flex; align-items: center; gap: 0.75rem; color: var(--text3); font-size: 0.8rem; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.invite-row { display: flex; gap: 0.5rem; }
.status-badge {
  display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.8rem;
  color: var(--text2); padding: 0.35rem 0.85rem; background: var(--surface);
  border-radius: 20px; border: 1px solid var(--border2); box-shadow: var(--shadow);
}
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); transition: background 0.3s; }
.status-dot.online { background: var(--green); box-shadow: 0 0 5px var(--green); }
.status-dot.connecting { background: var(--yellow); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

#saved-banner {
  display: none; background: var(--accent-dim); border: 1px solid var(--accent);
  border-radius: var(--radius-sm); padding: 0.9rem 1rem; gap: 0.75rem; align-items: center;
}
#saved-banner.show { display: flex; }
.saved-info { flex: 1; }
.saved-info p { font-size: 0.78rem; color: var(--text2); margin-bottom: 2px; }
.saved-info strong { font-size: 0.93rem; color: var(--accent-text); }

/* ── CHAT ── */
#chat { flex-direction: column; height: 100vh; max-width: 720px; margin: 0 auto; width: 100%; background: var(--bg); }
.chat-header {
  display: flex; align-items: center; gap: 0.65rem; padding: 0.85rem 1.1rem;
  background: var(--surface); border-bottom: 1px solid var(--border2);
  flex-shrink: 0; box-shadow: var(--shadow);
}
.chat-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent-dim); border: 2px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; font-weight: 700; color: var(--accent-text); flex-shrink: 0;
}
.chat-header-info { flex: 1; }
.chat-header-name { font-size: 0.95rem; font-weight: 600; color: var(--text); }
.chat-header-sub { font-size: 0.72rem; color: var(--text3); margin-top: 1px; }
.header-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 0.95rem;
  transition: all 0.15s; flex-shrink: 0;
}
.header-btn:hover { background: var(--surface3); color: var(--text); }
.header-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent-text); }

/* MESSAGES */
#messages {
  flex: 1; overflow-y: auto; padding: 1.1rem 1.1rem 0.5rem;
  display: flex; flex-direction: column; gap: 0.45rem;
  scrollbar-width: thin; scrollbar-color: var(--surface3) transparent;
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

.msg-row { display: flex; align-items: flex-end; gap: 0.4rem; animation: msgIn 0.18s ease; }
@keyframes msgIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.msg-row.me { flex-direction: row-reverse; }

.msg-av {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--accent-dim); border: 1.5px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.68rem; font-weight: 700; color: var(--accent-text); flex-shrink: 0;
}

/* bubble + meta inline */
.msg-bubble-wrap {
  display: flex; align-items: flex-end; gap: 5px;
  max-width: 72%;
}
.msg-row.me .msg-bubble-wrap { flex-direction: row-reverse; }

.bubble {
  padding: 0.55rem 0.9rem; border-radius: 16px;
  font-size: 0.88rem; line-height: 1.55; word-break: break-word;
  box-shadow: var(--shadow);
}
.bubble.short { white-space: nowrap; display: inline-block; }
.bubble.long { white-space: pre-wrap; display: block; }
.bubble.me {
  background: var(--bubble-me); color: var(--bubble-me-text);
  border-bottom-right-radius: 4px;
}
.bubble.friend {
  background: var(--bubble-friend); color: var(--bubble-friend-text);
  border: 1px solid var(--border2); border-bottom-left-radius: 4px;
}
.bubble img { max-width: 200px; border-radius: 10px; display: block; margin-top: 4px; }

/* 파일 첨부 버블 */
.file-bubble {
  display: flex; align-items: center; gap: 0.6rem;
  padding: 0.55rem 0.9rem; border-radius: 14px;
  font-size: 0.85rem; box-shadow: var(--shadow);
  text-decoration: none; cursor: pointer;
}
.file-bubble.me { background: var(--bubble-me); color: var(--bubble-me-text); border-bottom-right-radius:4px; }
.file-bubble.friend { background: var(--bubble-friend); color: var(--bubble-friend-text); border:1px solid var(--border2); border-bottom-left-radius:4px; }
.file-icon { font-size: 1.3rem; flex-shrink: 0; }
.file-info { display: flex; flex-direction: column; }
.file-name { font-weight: 600; font-size: 0.83rem; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-size { font-size: 0.72rem; opacity: 0.7; margin-top: 1px; }

/* meta: time + read — 말풍선 옆에 세로 배치 */
.msg-meta {
  display: flex; flex-direction: column; align-items: flex-end;
  gap: 2px; flex-shrink: 0; padding-bottom: 3px;
}
.msg-row.me .msg-meta { align-items: flex-end; }
.msg-row:not(.me) .msg-meta { align-items: flex-start; }
.meta-time { font-size: 0.7rem; color: var(--text3); white-space: nowrap; }
.read-status { font-size: 0.7rem; white-space: nowrap; }
.read-status.read { color: var(--accent-darker); }
.read-status.unread { color: var(--text3); }

.reactions { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
.reaction-pill {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 20px; padding: 1px 7px; font-size: 0.73rem; cursor: pointer;
  transition: background 0.12s;
}
.reaction-pill:hover { background: var(--surface3); }

.msg-actions { opacity: 0; transition: opacity 0.15s; align-self: center; }
.msg-row:hover .msg-actions { opacity: 1; }
.react-btn {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 20px; padding: 2px 8px; font-size: 0.7rem;
  color: var(--text2); cursor: pointer; box-shadow: var(--shadow);
}
.react-btn:hover { background: var(--surface2); }

.sys-msg { text-align: center; font-size: 0.72rem; color: var(--text3); padding: 0.2rem 0; }

/* typing */
#typing-indicator {
  padding: 0 1.1rem 0.4rem; font-size: 0.75rem; color: var(--text3);
  display: none; align-items: center; gap: 0.4rem; flex-shrink: 0;
}
.typing-dots span {
  display: inline-block; width: 4px; height: 4px; border-radius: 50%;
  background: var(--text3); margin: 0 1px; animation: blink 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* emoji picker */
#emoji-picker {
  display: none; flex-wrap: wrap; gap: 2px; padding: 0.6rem;
  background: var(--surface); border-top: 1px solid var(--border);
  max-height: 130px; overflow-y: auto; flex-shrink: 0;
}
#emoji-picker.open { display: flex; }
#emoji-picker span { font-size: 1.3rem; padding: 4px; cursor: pointer; border-radius: 6px; }
#emoji-picker span:hover { background: var(--surface2); }

/* input area */
.input-area {
  padding: 0.7rem 0.9rem; background: var(--surface);
  border-top: 1px solid var(--border2);
  display: flex; gap: 0.45rem; align-items: flex-end; flex-shrink: 0;
}
.icon-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 0.95rem;
  flex-shrink: 0; transition: all 0.15s;
}
.icon-btn:hover { background: var(--surface3); color: var(--text); }
#msg-input {
  flex: 1; padding: 0.6rem 1rem; background: var(--surface2);
  border: 1px solid var(--border2); border-radius: 20px;
  color: var(--text); font-size: 0.9rem; font-family: inherit;
  resize: none; outline: none; max-height: 100px; line-height: 1.5;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#msg-input:focus { border-color: var(--accent-dark); box-shadow: 0 0 0 3px rgba(177,206,230,0.2); }
#msg-input::placeholder { color: var(--text3); }
#send-btn {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: var(--accent); cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all 0.15s; box-shadow: 0 2px 8px rgba(177,206,230,0.4);
}
#send-btn:hover { background: var(--accent-dark); }
#send-btn:active { transform: scale(0.93); }

/* modals */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25);
  align-items: center; justify-content: center; z-index: 200; padding: 1rem;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal-card {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 380px;
  display: flex; flex-direction: column; gap: 1rem; box-shadow: var(--shadow-md);
}
.modal-card h3 { font-size: 1rem; font-weight: 600; color: var(--text); }
.modal-card p { font-size: 0.83rem; color: var(--text2); line-height: 1.55; }
.copy-row { display: flex; gap: 0.5rem; }
.copy-input {
  flex: 1; padding: 0.6rem 0.9rem; background: var(--surface2);
  border: 1px solid var(--border2); border-radius: var(--radius-sm);
  color: var(--text2); font-size: 0.78rem; font-family: 'Courier New', monospace;
  outline: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* LOCK SCREEN */
#lock-screen {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: var(--bg);
  flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem;
}
#lock-screen.active { display: flex; }
.lock-icon-big {
  width: 72px; height: 72px; border-radius: 24px;
  background: var(--accent); box-shadow: 0 4px 20px rgba(177,206,230,0.5);
  display: flex; align-items: center; justify-content: center; font-size: 2rem;
}
.lock-title { font-size: 1.2rem; font-weight: 600; color: var(--text); }
.lock-subtitle { font-size: 0.85rem; color: var(--text2); margin-top: -0.75rem; }
.lock-input-wrap { position: relative; width: 240px; }
.lock-input-wrap input {
  width: 100%; padding: 0.75rem 2.8rem 0.75rem 1.1rem;
  font-size: 1.1rem; letter-spacing: 0.2em; text-align: center;
  border-radius: var(--radius-sm); border: 1.5px solid var(--border2);
  background: var(--surface); color: var(--text); font-family: inherit; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.lock-input-wrap input:focus { border-color: var(--accent-dark); box-shadow: 0 0 0 3px rgba(177,206,230,0.25); }
.lock-error { font-size: 0.82rem; color: var(--red); height: 1em; text-align: center; }
.lock-hint { font-size: 0.75rem; color: var(--text3); }

/* notification permission banner */
#notif-banner {
  display: none; background: rgba(177,206,230,0.15); border-bottom: 1px solid var(--accent);
  padding: 0.55rem 1.1rem; align-items: center; gap: 0.75rem; flex-shrink: 0;
}
#notif-banner.show { display: flex; }
#notif-banner p { flex: 1; font-size: 0.8rem; color: var(--text2); }

/* paste preview */
#paste-preview {
  display: none; padding: 0.5rem 0.9rem; background: var(--surface);
  border-top: 1px solid var(--border); align-items: center; gap: 0.7rem; flex-shrink: 0;
}
#paste-preview.show { display: flex; }
#paste-preview img { max-height: 56px; border-radius: 8px; border: 1px solid var(--border2); }
#paste-preview .paste-label { font-size: 0.8rem; color: var(--text2); flex: 1; }

#image-input, #file-input { display: none; }
.deleted-notice { font-size: 0.7rem; color: var(--text3); text-align: center; font-style: italic; padding: 2px 0; }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby" class="screen active">
  <div class="lobby-inner">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 28 28" fill="none"><path d="M4 6C4 4.9 4.9 4 6 4H22C23.1 4 24 4.9 24 6V17C24 18.1 23.1 19 22 19H15L10 24V19H6C4.9 19 4 18.1 4 17V6Z" fill="white" fill-opacity="0.95"/></svg>
      </div>
      <h1>채팅</h1>
      <p>친구와 실시간으로 대화해요</p>
    </div>

    <div id="saved-banner">
      <div style="font-size:1.4rem">🔗</div>
      <div class="saved-info">
        <p>이전에 연결한 친구</p>
        <strong id="saved-friend-nick">친구</strong>
      </div>
      <button class="btn btn-primary" id="reconnect-btn" style="padding:.6rem 1rem;font-size:.85rem">다시 연결</button>
      <button class="btn btn-ghost" id="clear-saved-btn" style="padding:.6rem .75rem;font-size:.85rem">삭제</button>
    </div>

    <div class="card">
      <div>
        <div class="field-label">닉네임</div>
        <input type="text" id="nick-input" placeholder="사용할 이름을 입력하세요" maxlength="16">
      </div>
      <button class="btn btn-primary" id="create-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        새 채팅방 만들기
      </button>
      <div class="divider">또는</div>
      <div>
        <div class="field-label">초대 코드로 참여</div>
        <div class="invite-row">
          <input type="text" id="join-code-input" placeholder="초대 코드 입력..." style="font-family:'Courier New',monospace;font-size:.85rem">
          <button class="btn btn-ghost" id="join-btn" style="white-space:nowrap;padding:.7rem 1rem">참여하기</button>
        </div>
      </div>
    </div>

    <div style="display:flex;align-items:center;justify-content:center">
      <div class="status-badge">
        <div class="status-dot connecting" id="lobby-dot"></div>
        <span id="lobby-status">연결 중...</span>
      </div>
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="screen">
  <!-- 알림 허용 배너 -->
  <div id="notif-banner">
    <p>🔔 다른 탭/앱에서도 알림을 받으려면 알림 권한을 허용해주세요.</p>
    <button class="btn btn-primary" id="allow-notif-btn" style="padding:.5rem .9rem;font-size:.8rem;white-space:nowrap">허용</button>
    <button class="btn btn-ghost" id="dismiss-notif-btn" style="padding:.5rem .75rem;font-size:.8rem">닫기</button>
  </div>

  <!-- 헤더 -->
  <div class="chat-header">
    <div class="chat-avatar" id="friend-avatar">?</div>
    <div class="chat-header-info">
      <div class="chat-header-name" id="friend-name-header">연결 대기 중...</div>
      <div class="chat-header-sub" id="conn-status-header">상대방을 기다리는 중</div>
    </div>
    <!-- 알림 On/Off -->
    <button class="header-btn active" id="notif-toggle-btn" title="알림 켜짐">
      <svg id="notif-icon-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <svg id="notif-icon-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M13.73 21a2 2 0 0 1-3.46 0"/><line x1="1" y1="1" x2="23" y2="23"/><path d="M17.47 17.47A7.93 7.93 0 0 1 6 8.12M4.42 4.42A6 6 0 0 0 6 8c0 7-3 9-3 9h14"/></svg>
    </button>
    <!-- 잠금 -->
    <button class="header-btn" id="lock-btn" title="잠금화면">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </button>
    <!-- 초대 -->
    <button class="header-btn" id="invite-btn" title="친구 초대">

<script>
const EXPIRE_MS = 6*60*60*1000;
const LOCK_PASS = 'alswl';
const LS_MY_NICK='chat_my_nick', LS_MY_ID='chat_my_peer_id';
const LS_FRIEND_ID='chat_friend_peer_id', LS_FRIEND_NICK='chat_friend_nick';
const LS_NOTIF='chat_notif_on';

const getSavedMyId=()=>localStorage.getItem(LS_MY_ID);
const saveMyId=id=>localStorage.setItem(LS_MY_ID,id);
const getSavedFriendId=()=>localStorage.getItem(LS_FRIEND_ID);
const getSavedFriendNick=()=>localStorage.getItem(LS_FRIEND_NICK)||'';
const saveFriend=(id,nick)=>{localStorage.setItem(LS_FRIEND_ID,id);localStorage.setItem(LS_FRIEND_NICK,nick);};
const clearFriend=()=>{localStorage.removeItem(LS_FRIEND_ID);localStorage.removeItem(LS_FRIEND_NICK);};
const getSavedMyNick=()=>localStorage.getItem(LS_MY_NICK)||'';
const saveMyNick=n=>localStorage.setItem(LS_MY_NICK,n);

// DOM
const lobbyEl=document.getElementById('lobby');
const chatEl=document.getElementById('chat');
const nickInput=document.getElementById('nick-input');
const createBtn=document.getElementById('create-btn');
const joinCodeInput=document.getElementById('join-code-input');
const joinBtn=document.getElementById('join-btn');
const lobbyDot=document.getElementById('lobby-dot');
const lobbyStatus=document.getElementById('lobby-status');
const savedBanner=document.getElementById('saved-banner');
const savedFriendNickEl=document.getElementById('saved-friend-nick');
const reconnectBtn=document.getElementById('reconnect-btn');
const clearSavedBtn=document.getElementById('clear-saved-btn');
const msgsEl=document.getElementById('messages');
const msgInput=document.getElementById('msg-input');
const sendBtnEl=document.getElementById('send-btn');
const emojiBtnEl=document.getElementById('emoji-btn');
const emojiPickerEl=document.getElementById('emoji-picker');
const imgBtnEl=document.getElementById('img-btn');
const fileBtnEl=document.getElementById('file-btn');
const imageInput=document.getElementById('image-input');
const fileInput=document.getElementById('file-input');
const friendNameHeader=document.getElementById('friend-name-header');
const connStatusHeader=document.getElementById('conn-status-header');
const friendAvatarEl=document.getElementById('friend-avatar');
const inviteBtn=document.getElementById('invite-btn');
const leaveBtnEl=document.getElementById('leave-btn');
const inviteModal=document.getElementById('invite-modal');
const myPeerIdDisplay=document.getElementById('my-peer-id-display');
const copyBtnEl=document.getElementById('copy-btn');
const closeModalBtn=document.getElementById('close-modal-btn');
const typingIndicator=document.getElementById('typing-indicator');
const typingNameEl=document.getElementById('typing-name');
const notifBanner=document.getElementById('notif-banner');
const allowNotifBtn=document.getElementById('allow-notif-btn');
const dismissNotifBtn=document.getElementById('dismiss-notif-btn');
const notifToggleBtn=document.getElementById('notif-toggle-btn');
const notifIconOn=document.getElementById('notif-icon-on');
const notifIconOff=document.getElementById('notif-icon-off');
const lockBtnEl=document.getElementById('lock-btn');
const lockScreen=document.getElementById('lock-screen');
const lockInput=document.getElementById('lock-input');
const lockError=document.getElementById('lock-error');
const pastePreview=document.getElementById('paste-preview');
const pastePreviewImg=document.getElementById('paste-preview-img');
const pasteLabelEl=document.getElementById('paste-label');
const pasteSendBtn=document.getElementById('paste-send-btn');
const pasteCancelBtn=document.getElementById('paste-cancel-btn');

let myNick=getSavedMyNick()||'';
let friendNick='';
let myPeerId='';
let peer=null, conn=null;
let typingTimer=null, isTyping=false;
let msgIdCounter=0;
let notifOn=localStorage.getItem(LS_NOTIF)!=='off';
let isLocked=false;
let pasteBuffer=null; // {blob, dataUrl, name}
let reconnectAttempts=0;

// ── 알림 On/Off ──
function applyNotifToggleUI(){
  if(notifOn){
    notifToggleBtn.classList.add('active');
    notifToggleBtn.title='알림 켜짐';
    notifIconOn.style.display=''; notifIconOff.style.display='none';
  } else {
    notifToggleBtn.classList.remove('active');
    notifToggleBtn.title='알림 꺼짐';
    notifIconOn.style.display='none'; notifIconOff.style.display='';
  }
}
notifToggleBtn.addEventListener('click',()=>{
  notifOn=!notifOn;
  localStorage.setItem(LS_NOTIF, notifOn?'on':'off');
  applyNotifToggleUI();
});
applyNotifToggleUI();

// ── OS 알림 권한 ──
allowNotifBtn.addEventListener('click',()=>{
  Notification.requestPermission().then(p=>{ if(p==='granted') notifBanner.classList.remove('show'); });
});
dismissNotifBtn.addEventListener('click',()=>notifBanner.classList.remove('show'));

function showNotifBanner(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='default') notifBanner.classList.add('show');
}

// OS 알림 전송 (잠금화면 여부 반영)
function sendOsNotif(title, body){
  if(!notifOn) return;
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  if(document.visibilityState==='visible'&&!isLocked) return;
  const notifBody = isLocked ? '알림이 도착하였습니다.' : body;
  const notifTitle = isLocked ? '채팅' : title;
  try {
    const n=new Notification(notifTitle,{body:notifBody,icon:''});
    n.onclick=()=>{window.focus();n.close();};
  } catch(e){}
}

// 알림음 (웹 밖 또는 탭 숨겨졌을 때만)
function playNotifSound(){
  if(!notifOn) return;
  if(document.visibilityState==='visible'&&!isLocked) return;
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o1=ctx.createOscillator(),o2=ctx.createOscillator(),gain=ctx.createGain();
    o1.type='sine'; o1.frequency.setValueAtTime(880,ctx.currentTime);
    o2.type='sine'; o2.frequency.setValueAtTime(1100,ctx.currentTime+0.1);
    gain.gain.setValueAtTime(0.16,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
    o1.connect(gain);o2.connect(gain);gain.connect(ctx.destination);
    o1.start(ctx.currentTime);o1.stop(ctx.currentTime+0.12);
    o2.start(ctx.currentTime+0.1);o2.stop(ctx.currentTime+0.35);
  } catch(e){}
}

// ── 잠금화면 ──
lockBtnEl.addEventListener('click',()=>activateLock());
function activateLock(){
  isLocked=true;
  lockScreen.classList.add('active');
  lockInput.value='';
  lockError.textContent='';
  setTimeout(()=>lockInput.focus(),100);
}
function deactivateLock(){
  isLocked=false;
  lockScreen.classList.remove('active');
}
lockInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(lockInput.value===LOCK_PASS){
      deactivateLock();
    } else {
      lockError.textContent='암호가 틀렸습니다.';
      lockInput.value='';
      lockInput.style.animation='shake .3s';
      setTimeout(()=>lockInput.style.animation='',350);
    }
  }
});
// shake animation
const styleEl=document.createElement('style');
styleEl.textContent='@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}';
document.head.appendChild(styleEl);

// ── PeerJS ──
function initPeer(savedId){
  const options={debug:0};
  peer=savedId?new Peer(savedId,options):new Peer(options);
  peer.on('open',id=>{
    myPeerId=id; saveMyId(id); myPeerIdDisplay.value=id;
    lobbyDot.classList.remove('connecting'); lobbyDot.classList.add('online');
    lobbyStatus.textContent='서버 연결됨';
    checkSavedFriend();
  });
  peer.on('error',err=>{
    if(err.type==='unavailable-id'){peer.destroy();initPeer(null);return;}
    lobbyStatus.textContent='연결 오류: '+err.type;
  });
  peer.on('connection',incoming=>setupConnection(incoming,incoming.peer));
}
if(myNick) nickInput.value=myNick;
initPeer(getSavedMyId());

function checkSavedFriend(){
  const fid=getSavedFriendId(),fnick=getSavedFriendNick();
  if(fid){savedFriendNickEl.textContent=fnick||fid.slice(0,8)+'...';savedBanner.classList.add('show');}
}
reconnectBtn.addEventListener('click',()=>{
  const nick=nickInput.value.trim()||getSavedMyNick()||'나';
  myNick=nick;saveMyNick(nick);
  const fid=getSavedFriendId();
  if(!fid||!myPeerId) return;
  const c=peer.connect(fid,{metadata:{nick:myNick,peerId:myPeerId}});
  setupConnection(c,fid);showChat();addSysMsg('이전 친구에게 재연결 중...');
});
clearSavedBtn.addEventListener('click',()=>{clearFriend();savedBanner.classList.remove('show');});

createBtn.addEventListener('click',()=>{
  const nick=nickInput.value.trim();if(!nick){nickInput.focus();return;}
  myNick=nick;saveMyNick(nick);if(!myPeerId){lobbyStatus.textContent='잠시 후 다시 시도하세요';return;}
  showChat();addSysMsg('채팅방이 만들어졌어요. 👥 버튼으로 친구를 초대하세요!');
  inviteModal.classList.add('open');
});
joinBtn.addEventListener('click',()=>{
  const nick=nickInput.value.trim(),code=joinCodeInput.value.trim();
  if(!nick){nickInput.focus();return;}if(!code){joinCodeInput.focus();return;}
  if(!myPeerId){lobbyStatus.textContent='잠시 후 다시 시도하세요';return;}
  myNick=nick;saveMyNick(nick);
  const c=peer.connect(code,{metadata:{nick:myNick,peerId:myPeerId}});
  setupConnection(c,code);showChat();addSysMsg('연결 중...');
});

function showChat(){
  lobbyEl.classList.remove('active');chatEl.classList.add('active');showNotifBanner();
}

function setupConnection(c,remotePeerId){
  if(conn){try{conn.close();}catch(e){}}
  conn=c;
  conn.on('open',()=>{
    if(conn.metadata&&conn.metadata.nick){friendNick=conn.metadata.nick;saveFriend(remotePeerId||conn.peer,friendNick);}
    conn.send({type:'hello',nick:myNick,peerId:myPeerId});
    reconnectAttempts=0;updateFriendUI(true);
    addSysMsg('🟢 '+(friendNick||'상대방')+'님과 연결됐어요!');checkSavedFriend();
  });
  conn.on('data',handleData);
  conn.on('close',()=>{
    addSysMsg('🔴 상대방이 연결을 끊었어요. 자동 재연결을 시도합니다...');
    connStatusHeader.textContent='연결 끊김';typingIndicator.style.display='none';
    conn=null;scheduleReconnect();
  });
  conn.on('error',()=>{conn=null;scheduleReconnect();});
}

function scheduleReconnect(){
  const fid=getSavedFriendId();if(!fid||!myPeerId) return;
  const delay=Math.min(3000*(reconnectAttempts+1),30000);reconnectAttempts++;
  setTimeout(()=>{
    if(conn&&conn.open) return;
    addSysMsg('재연결 시도 중...');
    const c=peer.connect(fid,{metadata:{nick:myNick,peerId:myPeerId}});
    setupConnection(c,fid);
  },delay);
}

function handleData(data){
  if(!data||typeof data!=='object') return;
  if(data.type==='hello'){
    friendNick=data.nick||'상대방';
    if(data.peerId) saveFriend(data.peerId,friendNick);
    reconnectAttempts=0;updateFriendUI(true);checkSavedFriend();return;
  }
  if(data.type==='msg'){
    addMsg(data.text||'',false,data.imgSrc||null,data.msgId,data.file||null);
    if(document.visibilityState==='visible'&&!isLocked&&conn&&conn.open)
      conn.send({type:'read',msgId:data.msgId});
    const disp=data.file?('[파일] '+data.file.name):(data.imgSrc?'[이미지]':(data.text||''));
    playNotifSound();
    sendOsNotif(friendNick||'메시지',disp);
    return;
  }
  if(data.type==='read'){markAsRead(data.msgId);return;}
  if(data.type==='reaction'){applyReaction(data.msgId,data.emoji);return;}
  if(data.type==='typing'){typingIndicator.style.display=data.value?'flex':'none';return;}
}

document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&!isLocked&&conn&&conn.open){
    document.querySelectorAll('.read-status.unread[data-msgid]').forEach(el=>{
      conn.send({type:'read',msgId:el.dataset.msgid});
    });
  }
});

function updateFriendUI(online){
  const name=friendNick||'상대방';
  friendNameHeader.textContent=name;connStatusHeader.textContent=online?'온라인':'오프라인';
  friendAvatarEl.textContent=name[0].toUpperCase();typingNameEl.textContent=name;
}

function nowStr(){
  const d=new Date();let h=d.getHours(),m=d.getMinutes();
  return(h>=12?'오후 ':'오전 ')+(h>12?h-12:h||12)+':'+String(m).padStart(2,'0');
}
function bubbleLenClass(text){ return (text||'').replace(/\s/g,'').length<=15?'short':'long'; }
function formatFileSize(bytes){
  if(bytes<1024) return bytes+'B';
  if(bytes<1024*1024) return (bytes/1024).toFixed(1)+'KB';
  return (bytes/(1024*1024)).toFixed(1)+'MB';
}
function fileIcon(name){
  const ext=(name||'').split('.').pop().toLowerCase();
  if(['pdf'].includes(ext)) return '📄';
  if(['ppt','pptx'].includes(ext)) return '📊';
  if(['hwp','hwpx'].includes(ext)) return '📝';
  if(['doc','docx'].includes(ext)) return '📃';
  if(['xls','xlsx'].includes(ext)) return '📈';
  if(['zip','rar','7z'].includes(ext)) return '🗜';
  return '📎';
}

function addMsg(text, isMine, imgSrc, remoteMsgId, fileData){
  const id=isMine?('msg-'+(++msgIdCounter)):(remoteMsgId||('rmsg-'+(++msgIdCounter)));
  const sentAt=Date.now();
  const row=document.createElement('div');
  row.className='msg-row'+(isMine?' me':''); row.id=id; row.dataset.sent=sentAt;

  if(!isMine){
    const av=document.createElement('div');av.className='msg-av';
    av.textContent=(friendNick||'?')[0].toUpperCase();row.appendChild(av);
  }

  // bubble + meta wrapper
  const wrap=document.createElement('div');
  wrap.className='msg-bubble-wrap';

  let bubble;

  if(fileData){
    // 파일 버블
    const link=document.createElement('a');
    link.className='file-bubble '+(isMine?'me':'friend');
    if(fileData.dataUrl){
      link.href=fileData.dataUrl;link.download=fileData.name;
    }
    const icon=document.createElement('span');icon.className='file-icon';icon.textContent=fileIcon(fileData.name);
    const info=document.createElement('div');info.className='file-info';
    const fname=document.createElement('span');fname.className='file-name';fname.textContent=fileData.name;
    const fsize=document.createElement('span');fsize.className='file-size';
    fsize.textContent=(fileData.size?formatFileSize(fileData.size):'')+' — 클릭하여 다운로드';
    info.appendChild(fname);info.appendChild(fsize);
    link.appendChild(icon);link.appendChild(info);
    bubble=link;
  } else if(imgSrc){
    bubble=document.createElement('div');
    bubble.className='bubble '+(isMine?'me':'friend')+' long';
    const img=document.createElement('img');img.src=imgSrc;bubble.appendChild(img);
  } else {
    bubble=document.createElement('div');
    const lc=bubbleLenClass(text);
    bubble.className='bubble '+(isMine?'me':'friend')+' '+lc;
    bubble.textContent=text;
  }

  // meta (time + read) — 말풍선 옆
  const meta=document.createElement('div');meta.className='msg-meta';
  let readEl=null;
  if(isMine){
    readEl=document.createElement('span');readEl.className='read-status unread';
    readEl.dataset.msgid=id;readEl.textContent='✓ 안읽음';meta.appendChild(readEl);
  }
  const timeSpan=document.createElement('span');timeSpan.className='meta-time';timeSpan.textContent=nowStr();
  meta.appendChild(timeSpan);

  // bubble + meta 배치
  if(isMine){ wrap.appendChild(meta);wrap.appendChild(bubble); }
  else { wrap.appendChild(bubble);wrap.appendChild(meta); }

  // reactions
  const reactions=document.createElement('div');reactions.className='reactions';

  const bodyWrap=document.createElement('div');
  bodyWrap.style.cssText='display:flex;flex-direction:column;'+(isMine?'align-items:flex-end':'align-items:flex-start');
  bodyWrap.appendChild(wrap);
  bodyWrap.appendChild(reactions);
  row.appendChild(bodyWrap);

  if(!isMine){
    const actions=document.createElement('div');actions.className='msg-actions';
    const rb=document.createElement('button');rb.className='react-btn';rb.textContent='+ 반응';
    rb.onclick=()=>pickReaction(id,reactions);actions.appendChild(rb);row.appendChild(actions);
  }

  msgsEl.appendChild(row);msgsEl.scrollTop=msgsEl.scrollHeight;
  startExpireTimer(row,sentAt);
  return id;
}

function markAsRead(msgId){
  const el=document.querySelector('.read-status[data-msgid="'+msgId+'"]');
  if(el){el.className='read-status read';el.textContent='✓✓ 읽음';}
}
function addSysMsg(text){
  const el=document.createElement('div');el.className='sys-msg';el.textContent=text;
  msgsEl.appendChild(el);msgsEl.scrollTop=msgsEl.scrollHeight;
}

function startExpireTimer(row,sentAt){
  setTimeout(()=>{
    if(!document.getElementById(row.id)) return;
    const notice=document.createElement('div');notice.className='deleted-notice';
    notice.textContent='이 메시지는 6시간이 지나 삭제됐어요';
    row.replaceWith(notice);setTimeout(()=>notice.remove(),4000);
  },EXPIRE_MS);
}

const REACTION_EMOJIS=['❤️','😂','👍','🔥','😮','😢','🎉','💯'];
function pickReaction(msgId,reactionsEl){
  const emoji=REACTION_EMOJIS[Math.floor(Math.random()*REACTION_EMOJIS.length)];
  applyReaction(msgId,emoji,reactionsEl);
  if(conn&&conn.open) conn.send({type:'reaction',msgId,emoji});
}
function applyReaction(msgId,emoji,reactionsEl){
  if(!reactionsEl){const row=document.getElementById(msgId);if(!row)return;reactionsEl=row.querySelector('.reactions');}
  if(!reactionsEl)return;
  const existing=Array.from(reactionsEl.querySelectorAll('.reaction-pill')).find(p=>p.dataset.emoji===emoji);
  if(existing){existing.dataset.count=parseInt(existing.dataset.count||1)+1;existing.textContent=emoji+' '+existing.dataset.count;}
  else{const pill=document.createElement('span');pill.className='reaction-pill';pill.dataset.emoji=emoji;pill.dataset.count=1;pill.textContent=emoji+' 1';reactionsEl.appendChild(pill);}
}

// ── 메시지 전송 ──
function sendMsg(){
  const txt=msgInput.value.trim();if(!txt)return;
  const id=addMsg(txt,true);
  if(conn&&conn.open) conn.send({type:'msg',text:txt,msgId:id});
  msgInput.value='';msgInput.style.height='auto';sendTyping(false);
}
sendBtnEl.addEventListener('click',sendMsg);
msgInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
msgInput.addEventListener('input',()=>{
  msgInput.style.height='auto';msgInput.style.height=Math.min(msgInput.scrollHeight,100)+'px';
  sendTyping(true);clearTimeout(typingTimer);typingTimer=setTimeout(()=>sendTyping(false),2000);
});
function sendTyping(val){if(isTyping===val)return;isTyping=val;if(conn&&conn.open)conn.send({type:'typing',value:val});}

// ── 이모지 ──
emojiBtnEl.addEventListener('click',e=>{e.stopPropagation();emojiPickerEl.classList.toggle('open');});
document.addEventListener('click',()=>emojiPickerEl.classList.remove('open'));
emojiPickerEl.querySelectorAll('span').forEach(sp=>{
  sp.addEventListener('click',e=>{e.stopPropagation();msgInput.value+=sp.textContent;msgInput.focus();emojiPickerEl.classList.remove('open');});
});

// ── 이미지 버튼 ──
imgBtnEl.addEventListener('click',()=>imageInput.click());
imageInput.addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const src=ev.target.result;
    const id=addMsg('',true,src);
    if(conn&&conn.open) conn.send({type:'msg',text:'',imgSrc:src,msgId:id});
  };
  reader.readAsDataURL(file);imageInput.value='';
});

// ── 파일 버튼 ──
fileBtnEl.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  sendFile(file);fileInput.value='';
});

function sendFile(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    const fileData={name:file.name,size:file.size,dataUrl:ev.target.result};
    const id=addMsg('',true,null,null,fileData);
    if(conn&&conn.open) conn.send({type:'msg',text:'',msgId:id,file:fileData});
  };
  reader.readAsDataURL(file);
}

// ── Ctrl+V 붙여넣기 ──
document.addEventListener('paste',e=>{
  const items=e.clipboardData&&e.clipboardData.items;
  if(!items)return;
  for(const item of items){
    if(item.type.startsWith('image/')){
      e.preventDefault();
      const blob=item.getAsFile();
      if(!blob)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        pasteBuffer={blob,dataUrl:ev.target.result,name:'image.png'};
        pastePreviewImg.src=ev.target.result;
        pasteLabelEl.textContent='이미지 붙여넣기 — 전송하시겠어요?';
        pastePreview.classList.add('show');
      };
      reader.readAsDataURL(blob);
      return;
    }
  }
});
pasteSendBtn.addEventListener('click',()=>{
  if(!pasteBuffer)return;
  const src=pasteBuffer.dataUrl;
  const id=addMsg('',true,src);
  if(conn&&conn.open) conn.send({type:'msg',text:'',imgSrc:src,msgId:id});
  pasteBuffer=null;pastePreview.classList.remove('show');pastePreviewImg.src='';
});
pasteCancelBtn.addEventListener('click',()=>{
  pasteBuffer=null;pastePreview.classList.remove('show');pastePreviewImg.src='';
});

// ── 초대 모달 ──
inviteBtn.addEventListener('click',()=>inviteModal.classList.add('open'));
closeModalBtn.addEventListener('click',()=>inviteModal.classList.remove('open'));
inviteModal.addEventListener('click',e=>{if(e.target===inviteModal)inviteModal.classList.remove('open');});
copyBtnEl.addEventListener('click',()=>{
  navigator.clipboard.writeText(myPeerId).then(()=>{copyBtnEl.textContent='복사됨 ✓';setTimeout(()=>copyBtnEl.textContent='복사',2000);})
  .catch(()=>{myPeerIdDisplay.select();document.execCommand('copy');copyBtnEl.textContent='복사됨 ✓';setTimeout(()=>copyBtnEl.textContent='복사',2000);});
});

// ── 나가기 ──
leaveBtnEl.addEventListener('click',()=>{
  if(!confirm('채팅방에서 나가시겠어요? 저장된 친구 정보는 유지됩니다.'))return;
  if(conn)conn.close();location.reload();
});

nickInput.addEventListener('keydown',e=>{if(e.key==='Enter')createBtn.click();});
joinCodeInput.addEventListener('keydown',e=>{if(e.key==='Enter')joinBtn.click();});
</script>
</body>
